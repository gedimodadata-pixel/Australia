<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australia Economy Presentation Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  overflow:hidden;
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:white;
}

.slide{
  position:absolute;
  width:100vw;
  height:100vh;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:scale(0.95);
  transition:all 0.8s ease;
}

.slide.active{
  opacity:1;
  transform:scale(1);
}

h1{
  font-size:2.8rem;
  color:#ff4da6;
  animation:fadeUp 1s ease;
}

p{
  max-width:800px;
  text-align:center;
  opacity:0;
  animation:fadeUp 1s ease forwards;
  animation-delay:0.5s;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px)}
  to{opacity:1; transform:translateY(0)}
}

.controls{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  background:#ff4da6;
  border:none;
  padding:10px 20px;
  margin:5px;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

.progress{
  position:fixed;
  top:0;
  left:0;
  height:5px;
  background:#ff4da6;
  width:0%;
  transition:width 5s linear;
}

canvas{max-width:90%;max-height:60%}

</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="slide active">
  <h1>🌸 Australia Economy</h1>
  <p>Phân tích giai đoạn 2023–2026</p>
</div>

<div class="slide">
  <h1>📉 2023–2024</h1>
  <p>Kinh tế chậm lại, lạm phát cao, tiêu dùng yếu</p>
</div>

<div class="slide">
  <h1>📈 2025–2026</h1>
  <p>Phục hồi nhưng chưa bền vững</p>
</div>

<div class="slide">
  <h1>📊 GDP Growth</h1>
  <canvas id="chart"></canvas>
</div>

<div class="slide">
  <h1>🎯 Kết luận</h1>
  <p>Hướng tới hạ cánh mềm nhưng còn rủi ro</p>
</div>

<div class="controls">
  <button onclick="prevSlide()">⬅</button>
  <button onclick="nextSlide()">➡</button>
</div>

<script>

let slides=document.querySelectorAll('.slide');
let index=0;
let auto=true;
let interval;

function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');

  // progress bar
  const bar=document.getElementById('progress');
  bar.style.width='0%';
  setTimeout(()=>bar.style.width='100%',50);
}

function nextSlide(){
  index=(index+1)%slides.length;
  showSlide(index);
}

function prevSlide(){
  index=(index-1+slides.length)%slides.length;
  showSlide(index);
}

// auto play
function startAuto(){
  interval=setInterval(()=>{
    nextSlide();
  },5000);
}

startAuto();

// keyboard
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') nextSlide();
  if(e.key==='ArrowLeft') prevSlide();
});

// chart
new Chart(document.getElementById('chart'),{
  type:'line',
  data:{
    labels:['2023','2024','2025','2026'],
    datasets:[{
      label:'GDP %',
      data:[1.5,1.3,2.3,2.2],
      tension:0.4
    }]
  }
});

</script>

</body>
</html>
